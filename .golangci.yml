version: "2"

run:
  timeout: 10m
  # Linting *_test.go catches more issues but roughly doubles analyzer work vs tests: false.
  tests: true

linters:
  default: none
  enable:
    - staticcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - forcetypeassert
    - errcheck
    - paralleltest
    - thelper
    - modernize
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: indent-error-flow
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gofumpt

issues:
  exclude-use-default: false
