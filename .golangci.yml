run:
  timeout: 10m
  # Test files are included so paralleltest/thelper can enforce subtest hygiene.
  tests: true

linters:
  disable-all: true
  enable:
    - staticcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - forcetypeassert
    - errcheck
    - paralleltest
    - thelper
    - gofumpt

linters-settings:
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: indent-error-flow
      # Bootstrap scaffold: many packages are placeholders; re-enable when APIs stabilize.
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true

issues:
  exclude-use-default: false
