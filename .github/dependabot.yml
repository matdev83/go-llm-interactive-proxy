version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Patch-only PRs: safest routine bumps (semver patch promise).
      go-patch:
        patterns:
          - "*"
        update-types:
          - "patch"
      # Minor bumps reviewed separately; can include behavior/API changes.
      go-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
