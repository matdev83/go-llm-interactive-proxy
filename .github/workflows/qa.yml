name: QA

on:
  push:
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Quality checks
        run: make quality-checks

      - name: Unit tests
        run: go test -short -parallel=8 ./...

      - name: Conformance package (explicit gate)
        run: go test ./internal/testkit/conformance/...

      - name: Release gates (fuzz smoke)
        env:
          # ~30 targets × FUZZTIME; keep within job timeout alongside race + lint.
          FUZZTIME: 6s
        run: make test-fuzz

      - name: Race detector
        run: bash scripts/race-check.sh --short --strict

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          args: --timeout=10m

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
