# Test-only: two local stubs with failover route; first fails after text delta (see localstub.stream_error_after_text_delta).
server:
  address: "127.0.0.1:0"

routing:
  max_attempts: 3
  default_route: "stub-bad:stub-default|stub-good:stub-default"

continuity:
  in_memory: true
  store: memory

logging:
  level: error
  format: text

diagnostics:
  enabled: false

hooks:
  tool_reactor_error_policy: fail_open

plugins:
  frontends:
    - id: openai-responses
      enabled: true
      config: {}
    - id: openai-legacy
      enabled: true
      config: {}
    - id: anthropic
      enabled: true
      config: {}
    - id: gemini
      enabled: true
      config: {}
  backends:
    - id: openai-responses
      enabled: false
      config: {}
    - id: openai-legacy
      enabled: false
      config: {}
    - id: anthropic
      enabled: false
      config: {}
    - id: gemini
      enabled: false
      config: {}
    - id: bedrock
      enabled: false
      config: {}
    - id: acp
      enabled: false
      config: {}
    - id: openrouter
      enabled: false
      config: {}
    - kind: local-stub
      id: stub-bad
      enabled: true
      config:
        text: "partial-bad"
        input_tokens: 1
        output_tokens: 1
        stream_error_after_text_delta: true
    - kind: local-stub
      id: stub-good
      enabled: true
      config:
        text: "FALLBACK-WIN"
        input_tokens: 1
        output_tokens: 1
  features:
    - id: submit-noop
      enabled: true
      config: {}
    - id: parts-noop
      enabled: true
      config: {}
    - id: tool-reactor-noop
      enabled: true
      config: {}
