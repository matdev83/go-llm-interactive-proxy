server:
  address: ":8080"
  # max_request_body_bytes: 10485760  # optional override; omit for handler default (8 MiB)

diagnostics:
  enabled: true
  health_path: "/healthz"
  attempts_path: "/admin/attempts"
  inventory_path: "/debug/inventory"
  route_trace_path: "/debug/route_trace"

routing:
  max_attempts: 3
  default_route: "openai-responses:gpt-4o-mini"

# Hook bus tuning (see docs/capability-catalogs.md and internal/plugins/features/REFERENCE_PLUGINS.md).
hooks:
  tool_reactor_error_policy: fail_open

continuity:
  in_memory: true
  store: memory
  # For durable continuity use instead:
  # store: sqlite
  # sqlite_path: ./data/continuity.db

plugins:
  frontends:
    - id: openai-responses
      enabled: true
      config: {}
    - id: openai-legacy
      enabled: true
      config: {}
    - id: anthropic
      enabled: true
      config: {}
    - id: gemini
      enabled: true
      config: {}
  backends:
    - id: openai-responses
      enabled: false
      config: {}
    - id: openai-legacy
      enabled: false
      config: {}
    - id: anthropic
      enabled: false
      config: {}
    - id: gemini
      enabled: false
      config: {}
    - id: bedrock
      enabled: false
      config: {}
    - id: acp
      enabled: false
      config: {}
  features:
    - id: submit-noop
      enabled: true
      config: {}
    - id: parts-noop
      enabled: true
      config: {}
    - id: tool-reactor-noop
      enabled: true
      config: {}
    # Reference (non-noop) examples — enable as needed:
    # - id: ref-submit-annotate
    #   enabled: true
    #   config: { marker: "staging" }
    # - id: ref-request-suffix
    #   enabled: true
    #   config: { suffix: " [ref]" }
    # - id: ref-tool-prefix
    #   enabled: true
    #   config: { prefix: ">>" }
